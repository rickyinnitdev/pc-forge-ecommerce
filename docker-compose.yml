services:
  db:
    image: mysql:8.0
    container_name: pcforge-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ecommerce}
      MYSQL_USER: ${MYSQL_USER:-ecom_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-ecom_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: pcforge-backend
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-ecom_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-ecom_pass}
      DB_NAME: ${MYSQL_DATABASE:-ecommerce}
      SECRET_KEY: ${BACKEND_SECRET_KEY:-supersecretkey}
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://localhost:8080}
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: pcforge-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
